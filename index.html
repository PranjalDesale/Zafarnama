<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zafarnama — Modern Indian History, Prelims &amp; Mains</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   ZAFARNAMA — design tokens
   Vivid, high-saturation palette — proven attention-and-engagement color
   theory (the same logic behind Duolingo green, Byju's oranges, Khan
   Academy's blues/purples): bright, distinct, high-contrast hues that keep
   long study sessions visually interesting, layered over a clean warm paper
   base so serious historical content still reads comfortably for hours.
   ========================================================================== */
:root{
  --ink:        #1f1a3d;
  --ink-soft:   #4c4776;
  --paper:      #FCF6E3;
  --paper-hi:   #FFFDF6;
  --paper-lo:   #F5E9C3;
  --paper-line: #E8D9A0;

  --navy:       #1E2A6B;
  --navy-deep:  #12184A;
  --navy-mid:   #2C3B8F;

  --vermilion:  #E63946;
  --vermilion-dark:#C1121F;
  --gold:       #F5A623;
  --gold-bright:#FFC93C;
  --gold-text:  #A6640D;
  --teal:       #06A77D;
  --teal-bright:#2EC4B6;
  --teal-text:  #046A4E;
  --saffron:    #FF7B00;
  --rose:       #E91E63;
  --rose-dark:  #B0134B;

  --prelims-accent: var(--gold-bright);
  --prelims-accent-soft: #FFEEB0;
  --mains-accent: var(--teal-bright);
  --mains-accent-soft: #C8F4EC;

  --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;
  --font-body: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;

  --radius-s: 6px;
  --radius-m: 12px;
  --radius-l: 20px;

  --shadow-card: 0 1px 2px rgba(30,42,107,.08), 0 6px 18px rgba(30,42,107,.10);
  --shadow-pop:  0 8px 30px rgba(18,24,74,.25);

  --topbar-h: 64px;
  --sidebar-w: 300px;

  --ease: cubic-bezier(.4,0,.2,1);
}

@media (prefers-color-scheme: dark){
  /* Intentionally not inverting to a generic dark theme — the paper palette
     is core to the identity. Users can still get a dimmer variant via the
     .dim-toggle if we add one later. */
}

*,*::before,*::after{ box-sizing: border-box; }
html{ scroll-behavior: smooth; }
body{
  margin:0;
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
img{ max-width:100%; display:block; }
button{ font-family: inherit; }

@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{ animation-duration: .001ms !important; animation-iteration-count:1 !important; transition-duration: .001ms !important; scroll-behavior:auto !important; }
}

/* subtle paper grain */
body::before{
  content:"";
  position:fixed; inset:0; z-index:0; pointer-events:none;
  opacity:.5;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(180,150,90,.10) 0, transparent 45%),
    radial-gradient(circle at 80% 60%, rgba(120,90,50,.08) 0, transparent 50%);
}

/* ==========================================================================
   TOP BAR
   ========================================================================== */
.topbar{
  position:sticky; top:0; z-index:40;
  height:var(--topbar-h);
  display:flex; align-items:center; gap:16px;
  padding:0 18px;
  background: var(--navy);
  color: var(--paper-hi);
  border-bottom: 3px solid var(--gold);
  box-shadow: var(--shadow-pop);
}
.icon-btn{
  background:transparent; border:none; color:inherit; cursor:pointer;
  width:38px; height:38px; border-radius:var(--radius-s);
  display:flex; align-items:center; justify-content:center;
  transition: background .18s var(--ease);
}
.icon-btn:hover{ background: rgba(255,255,255,.1); }
.icon-btn:focus-visible{ outline:2px solid var(--gold-bright); outline-offset:2px; }

.brand{ display:flex; align-items:center; gap:10px; margin-right:6px; }
.brand-seal{
  font-family:var(--font-display); font-weight:700; font-size:20px;
  width:38px; height:38px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background: radial-gradient(circle at 35% 30%, var(--gold-bright), var(--vermilion) 75%);
  color:var(--paper-hi);
  box-shadow: inset 0 0 0 2px rgba(255,255,255,.25), 0 2px 6px rgba(0,0,0,.35);
  flex:none;
}
.brand-text{ display:flex; flex-direction:column; line-height:1.15; }
.brand-title{ font-family:var(--font-display); font-weight:700; font-size:19px; letter-spacing:.3px; }
.brand-sub{ font-size:11px; color:#c9d2e6; letter-spacing:.3px; }

.search-wrap{
  position:relative; flex:1; max-width:420px; margin-left:8px;
  display:flex; align-items:center;
}
.search-icon{ position:absolute; left:12px; color:#8b96b8; pointer-events:none; }
.search-wrap input{
  width:100%; height:38px; border-radius:999px; border:1px solid rgba(255,255,255,.14);
  background: rgba(255,255,255,.08); color:var(--paper-hi);
  padding:0 14px 0 36px; font-size:14px; font-family:var(--font-body);
  transition: background .18s var(--ease), border-color .18s var(--ease);
}
.search-wrap input::placeholder{ color:#96a1c2; }
.search-wrap input:focus{ outline:none; background:rgba(255,255,255,.15); border-color: var(--gold-bright); }
.search-results{
  position:absolute; top:46px; left:0; right:0;
  background: var(--paper-hi); color:var(--ink); border-radius:var(--radius-m);
  box-shadow: var(--shadow-pop); overflow:hidden; display:none; z-index:60;
  max-height:420px; overflow-y:auto; border:1px solid var(--paper-line);
}
.search-results.show{ display:block; }
.search-result-item{
  padding:10px 14px; cursor:pointer; border-bottom:1px solid var(--paper-line);
  font-size:14px;
}
.search-result-item:last-child{ border-bottom:none; }
.search-result-item:hover, .search-result-item.active{ background: var(--prelims-accent-soft); }
.sr-row{ display:flex; justify-content:space-between; gap:10px; align-items:baseline; }
.sr-title{ font-weight:500; }
.search-result-item .sr-unit{ font-size:11px; color:var(--ink-soft); font-family:var(--font-mono); flex:none; }
.sr-snippet{
  margin-top:3px; font-size:12.5px; line-height:1.5; color:var(--ink-soft);
  overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
}
.sr-snippet mark{ background:var(--prelims-accent-soft); color:var(--ink); border-radius:3px; padding:0 2px; font-weight:600; }
.search-empty{ padding:14px; font-size:13px; color:var(--ink-soft); }

/* Mode toggle */
.mode-toggle{
  position:relative; display:flex; background: rgba(255,255,255,.08);
  border-radius:999px; padding:3px; gap:2px; flex:none;
  border:1px solid rgba(255,255,255,.14);
}
.mode-btn{
  position:relative; z-index:2; border:none; background:transparent; cursor:pointer;
  color:#c9d2e6; font-size:13.5px; font-weight:600; padding:7px 16px; border-radius:999px;
  display:flex; align-items:center; gap:7px; transition: color .25s var(--ease);
  white-space:nowrap;
}
.mode-dot{ width:7px; height:7px; border-radius:50%; background:currentColor; opacity:.5; transition:opacity .25s; }
.mode-btn[aria-selected="true"]{ color:var(--navy-deep); }
.mode-btn[aria-selected="true"] .mode-dot{ opacity:1; }
.mode-slider{
  position:absolute; top:3px; left:3px; height:calc(100% - 6px); width:calc(50% - 3px);
  border-radius:999px; background: var(--prelims-accent);
  transition: transform .32s var(--ease), background .32s var(--ease);
  z-index:1;
}
body[data-mode="mains"] .mode-slider{ transform:translateX(100%); background: var(--mains-accent); }
body[data-mode="mains"] .mode-btn[data-mode="mains"]{ color:#08201b; }
body[data-mode="mains"] .mode-btn[data-mode="prelims"]{ color:#c9d2e6; }
body[data-mode="prelims"] .mode-btn[data-mode="prelims"]{ color:#2c2308; }

/* ==========================================================================
   LAYOUT
   ========================================================================== */
.layout{ display:flex; min-height: calc(100vh - var(--topbar-h)); position:relative; }

.sidebar{
  width:var(--sidebar-w); flex:none;
  background: var(--navy-deep); color:#dfe4f2;
  position:sticky; top:var(--topbar-h); height: calc(100vh - var(--topbar-h));
  display:flex; flex-direction:column;
  transition: margin-left .3s var(--ease);
  z-index:30;
}
body[data-sidebar="closed"] .sidebar{ margin-left: calc(-1 * var(--sidebar-w)); }
.sidebar-scroll{ flex:1; overflow-y:auto; padding:14px 10px 20px; }
.sidebar-scroll::-webkit-scrollbar{ width:8px; }
.sidebar-scroll::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.12); border-radius:8px; }

.sidebar-scrim{
  display:none; position:fixed; inset:0; top:var(--topbar-h); background:rgba(12,18,36,.5); z-index:25;
}
body[data-sidebar="open"].is-mobile .sidebar-scrim{ display:block; }

.unit-block{ margin-bottom:6px; border-radius:var(--radius-m); overflow:hidden; }
.unit-head{
  width:100%; display:flex; align-items:center; gap:10px; padding:10px 10px;
  background: rgba(255,255,255,.04); border:none; color:#e8ecf7; cursor:pointer;
  border-radius:var(--radius-m); text-align:left;
}
.unit-head:hover{ background: rgba(255,255,255,.08); }
.unit-num{
  font-family:var(--font-mono); font-size:11px; color: var(--gold-bright);
  border:1px solid rgba(255,201,60,.55); border-radius:6px; padding:2px 6px; flex:none;
}
.unit-titles{ flex:1; min-width:0; }
.unit-title{ font-size:13.5px; font-weight:600; line-height:1.3; }
.unit-years{ font-size:10.5px; color:#8b96b8; font-family:var(--font-mono); }
.unit-chevron{ transition: transform .25s var(--ease); flex:none; color:#8b96b8; }
.unit-block.open .unit-chevron{ transform:rotate(90deg); }

.chapter-list{
  max-height:0; overflow:hidden; transition: max-height .35s var(--ease);
  padding-left:6px;
}
.unit-block.open .chapter-list{ max-height:900px; }

.chapter-item{
  display:flex; align-items:center; gap:9px; width:100%;
  padding:8px 10px 8px 16px; margin:2px 0; border:none; background:transparent; color:#c3cbe3;
  border-left:2px solid transparent; cursor:pointer; text-align:left; border-radius:0 8px 8px 0;
  font-size:13px;
}
.chapter-item:hover{ background:rgba(255,255,255,.06); color:#fff; }
.chapter-item.active{ background: rgba(255,201,60,.20); border-left-color:var(--gold-bright); color:#fff; }
.chapter-item .ch-num{ font-family:var(--font-mono); font-size:11px; color:#8b96b8; flex:none; width:20px; }
.chapter-item .ch-title{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.chapter-item .ch-badges{ display:flex; gap:4px; flex:none; }
.pyq-badge{
  font-family:var(--font-mono); font-size:9.5px; padding:1px 5px; border-radius:5px; line-height:1.5;
  border:1px solid currentColor;
}
.pyq-badge.p{ color: var(--gold-bright); }
.pyq-badge.m{ color: var(--teal-bright); }
.chapter-item.locked{ opacity:.5; cursor:default; }
.chapter-item .lock-ic{ flex:none; opacity:.7; }
.chapter-item.done .ch-num::after{ content:"✓"; color:#7bd88f; margin-left:2px; }

.sidebar-footer{ padding:14px 16px; border-top:1px solid rgba(255,255,255,.08); }
.progress-track{ height:6px; border-radius:4px; background:rgba(255,255,255,.1); overflow:hidden; margin-bottom:6px; }
.progress-fill{ height:100%; width:0%; background: linear-gradient(90deg, var(--gold), var(--vermilion)); transition:width .4s var(--ease); }
#progressLabel{ font-size:11px; color:#8b96b8; }

/* ==========================================================================
   CONTENT
   ========================================================================== */
.content{ flex:1; min-width:0; position:relative; z-index:1; padding:0 0 80px; }
.content-inner{ max-width:860px; margin:0 auto; padding:36px 28px 0; }

/* landing / roadmap page */
.hero{
  padding:54px 28px 40px; text-align:center; position:relative; overflow:hidden;
  background: radial-gradient(ellipse at top, rgba(245,166,35,.16), transparent 60%);
}
.hero-eyebrow{
  font-family:var(--font-mono); font-size:12px; letter-spacing:2px; text-transform:uppercase;
  color:var(--vermilion-dark); font-weight:600;
}
.hero h1{
  font-family:var(--font-display); font-size:clamp(32px,5vw,52px); margin:10px 0 14px; font-weight:700;
  letter-spacing:-.5px;
}
.hero p{ max-width:640px; margin:0 auto; color:var(--ink-soft); font-size:16.5px; line-height:1.6; }
.hero-stats{ display:flex; justify-content:center; gap:34px; margin-top:30px; flex-wrap:wrap; }
.hero-stat b{ display:block; font-family:var(--font-display); font-size:28px; color:var(--navy); }
.hero-stat span{ font-size:12px; color:var(--ink-soft); }

.unit-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; padding:8px 28px 40px; max-width:1100px; margin:0 auto; }
.unit-card{
  background:var(--paper-hi); border:1px solid var(--paper-line); border-radius:var(--radius-l);
  padding:20px; cursor:pointer; transition: transform .22s var(--ease), box-shadow .22s var(--ease);
  box-shadow: var(--shadow-card); position:relative; overflow:hidden;
}
.unit-card:hover{ transform:translateY(-3px); box-shadow: var(--shadow-pop); }
.unit-card::before{
  content:""; position:absolute; top:0; left:0; height:5px; width:100%;
  background: var(--card-accent, var(--gold));
}
.unit-card .uc-num{ font-family:var(--font-mono); font-size:12px; color:var(--ink-soft); }
.unit-card h3{ font-family:var(--font-display); font-size:20px; margin:6px 0 6px; }
.unit-card p{ font-size:13.5px; color:var(--ink-soft); line-height:1.5; margin:0 0 14px; }
.uc-meta{ display:flex; justify-content:space-between; font-size:11.5px; color:var(--ink-soft); font-family:var(--font-mono); }

/* chapter page */
.crumb{ font-size:12.5px; color:var(--ink-soft); margin-bottom:10px; display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
.crumb a{ color:var(--ink-soft); text-decoration:none; cursor:pointer; }
.crumb a:hover{ color:var(--vermilion-dark); text-decoration:underline; }

.ch-header{ margin-bottom:22px; }
.ch-eyebrow{ font-family:var(--font-mono); font-size:12px; color:var(--vermilion-dark); letter-spacing:1px; }
.ch-header h1{ font-family:var(--font-display); font-size:clamp(28px,4vw,40px); margin:8px 0 10px; line-height:1.15; }
.ch-years{ font-family:var(--font-mono); font-size:13px; color:var(--ink-soft); background:var(--paper-lo); display:inline-block; padding:3px 10px; border-radius:6px; }
.ch-summary{ font-size:16px; line-height:1.65; color:var(--ink-soft); margin-top:14px; max-width:70ch; }

.ch-actions{ display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
.btn{
  font-size:13.5px; font-weight:600; padding:9px 16px; border-radius:999px; border:1px solid var(--paper-line);
  background:var(--paper-hi); cursor:pointer; display:inline-flex; align-items:center; gap:7px; color:var(--ink);
  transition: all .2s var(--ease);
}
.btn:hover{ border-color:var(--navy); }
.btn.primary{ background:var(--navy); color:var(--paper-hi); border-color:var(--navy); }
.btn.primary:hover{ background:var(--navy-mid); }
.btn.done{ background:#e4f5e8; border-color:#8fcf9e; color:#20602f; }

/* Timeline ribbon (signature element) */
.ribbon-wrap{ margin:26px 0 30px; }
.ribbon-label{ font-family:var(--font-mono); font-size:11.5px; color:var(--ink-soft); margin-bottom:8px; text-transform:uppercase; letter-spacing:1px;}
.ribbon{ display:flex; height:54px; border-radius:10px; box-shadow:var(--shadow-card); }
.ribbon-seg{
  position:relative; display:flex; align-items:center; justify-content:center;
  min-width:0; flex-basis:0;
  color:#fff; font-family:var(--font-mono); font-size:11px; cursor:pointer;
  border-right:1px solid rgba(255,255,255,.25); transition: filter .2s;
}
.ribbon-seg:first-child{ border-radius:10px 0 0 10px; }
.ribbon-seg:last-child{ border-right:none; border-radius:0 10px 10px 0; }
.ribbon-seg:hover{ filter:brightness(1.15); z-index:6; }
.ribbon-seg span{
  padding:0 4px; white-space:nowrap; text-shadow:0 1px 2px rgba(0,0,0,.4);
  overflow:hidden; text-overflow:ellipsis; max-width:100%;
}
.ribbon-tip{
  position:absolute; bottom:120%; left:50%; transform:translateX(-50%) translateY(6px);
  background:var(--navy-deep); color:#fff; padding:8px 11px; border-radius:8px; font-family:var(--font-body);
  font-size:12.5px; white-space:normal; width:max-content; max-width:200px; text-align:center; line-height:1.4;
  opacity:0; pointer-events:none; transition:opacity .18s, transform .18s;
  box-shadow:var(--shadow-pop); z-index:5;
}
.ribbon-seg:hover .ribbon-tip{ opacity:1; transform:translateX(-50%) translateY(0); }

/* Flowchart component — for the notes' embedded process/succession diagrams */
.flowchart-wrap{ margin:22px 0 26px; }
.flow-label{
  font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:1px;
  color:var(--ink-soft); margin-bottom:10px; display:flex; align-items:center; gap:6px;
}
.flow-label::before{ content:"◈"; color:var(--gold-text); }
.flowchart{
  display:flex; flex-wrap:wrap; align-items:center; gap:0;
  background:var(--paper-hi); border:1px solid var(--paper-line); border-radius:var(--radius-m);
  padding:16px 14px; box-shadow:var(--shadow-card);
}
.flow-node{
  background:var(--paper); border:1.5px solid var(--navy); border-radius:9px;
  padding:8px 13px; font-size:13px; line-height:1.4; max-width:200px;
  text-align:center; color:var(--ink); font-weight:500;
}
.flow-node.branch{ border-color:var(--teal); border-style:dashed; }
.flow-node.end{ border-color:var(--vermilion); border-width:2px; font-weight:600; }
.flow-connector{
  flex:none; display:flex; align-items:center; justify-content:center;
  width:34px; height:34px; font-size:15px; margin:4px 2px;
}
.flow-connector.seq{ color:var(--vermilion-dark); font-weight:700; }
.flow-connector.combine{ color:var(--gold-text); font-weight:700; font-size:17px; }
.flow-connector.alt{ color:var(--ink-soft); font-weight:400; font-size:13px; }
@media (max-width:600px){
  .flowchart{ padding:12px 10px; }
  .flow-node{ max-width:150px; font-size:12.5px; }
}

/* section blocks */
.section-block{ margin:34px 0; scroll-margin-top:80px; }
.section-block h2{
  font-family:var(--font-display); font-size:24px; margin:0 0 14px; display:flex; align-items:center; gap:10px;
}
.section-block h2 .sec-no{ font-family:var(--font-mono); font-size:14px; color:var(--paper-line); font-weight:400; }
.section-prose{ font-size:16px; line-height:1.75; color:var(--ink); }
.section-prose p{ margin:0 0 14px; }
.section-prose b, .section-prose strong{ color:var(--navy); }
.term{ font-weight:600; color:var(--vermilion-dark); border-bottom:1px dotted var(--vermilion); }
.regnal{ font-family:var(--font-mono); font-size:.82em; color:var(--gold-text); vertical-align:super; }

/* fact chip list — surfaces strongly in Prelims mode */
.fact-list{ list-style:none; margin:14px 0; padding:0; display:grid; gap:8px; }
.fact-list li{
  display:flex; gap:10px; align-items:flex-start; background:var(--paper-hi); border:1px solid var(--paper-line);
  border-radius:var(--radius-s); padding:9px 12px; font-size:14.5px; line-height:1.5;
}
.fact-list li::before{ content:"◆"; color:var(--gold-text); font-size:10px; margin-top:5px; flex:none; }

/* data table */
.data-table{ width:100%; border-collapse:collapse; margin:16px 0; font-size:14px; overflow:hidden; border-radius:var(--radius-m); box-shadow:var(--shadow-card); }
.data-table th{ background:var(--navy); color:var(--paper-hi); text-align:left; padding:10px 12px; font-weight:600; font-size:13px; }
.data-table td{ padding:9px 12px; border-bottom:1px solid var(--paper-line); background:var(--paper-hi); }
.data-table tr:last-child td{ border-bottom:none; }
.data-table tr:nth-child(even) td{ background:var(--paper); }

/* callouts / alerts */
.callout{
  border-radius:var(--radius-m); padding:14px 16px; margin:16px 0; font-size:14.5px; line-height:1.6;
  border:1px solid; display:flex; gap:12px; align-items:flex-start;
}
.callout .co-ic{ flex:none; font-size:18px; line-height:1.3; }
.callout.tip{ background:#eef2fb; border-color:#c4d1f0; color:#1f2d55; }
.callout.confusion{ background:#fdf2e3; border-color:#eecd94; color:#6b4a10; }

.pyq-alert{ border-radius:var(--radius-m); padding:14px 16px; margin:18px 0; border:1px dashed; position:relative; }
.pyq-alert .pa-tag{
  font-family:var(--font-mono); font-size:10.5px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;
  padding:2px 8px; border-radius:5px; display:inline-block; margin-bottom:7px;
}

        <div class="section-prose">
        <p>Every chapter from here to 1947 keeps reusing five words — <span class="term">State</span>, <span class="term">Country</span>, <span class="term">Nation</span>, <span class="term">Sovereignty</span>, and <span class="term">Power</span> — so it's worth pinning them down once, properly, rather than re-deriving them every time they show up.</p>
        <p><b>Country</b> is simply territory. A <b>State</b> is the organisation that rules that territory and its people — and states come in flavours: a <span class="term">Military State</span> runs on military force, a <span class="term">Kingdom</span> passes headship by bloodline, an <span class="term">Empire</span> is a union of kingdoms under one crown, a <span class="term">Company State</span> is run by a chartered corporation (India, 1765–1858, under the East India Company), and a <span class="term">Nation State</span> is set up by the people themselves. A <b>Nation</b>, in the sense the French Revolution of 1789 gave the word, is a people bound by fraternity, equality, and liberty — which is exactly why "nationalism" could not really exist in India before those ideas arrived.</p>
        <p><b>Sovereignty</b> has two faces. There's the symbolic question — who is formally the head of state — and there's the functional question: who holds the legislative, executive, and judicial power to make, implement, and adjudicate law. That power divides again into <i>external</i> sovereign functions (defence, foreign affairs — war and diplomacy) and <i>domestic</i> ones (everything else: revenue, justice, agriculture, infrastructure). Keep this pair in your pocket — it is exactly the language the Regulating Act of 1773 and the Government of India Acts will later use to carve up authority between Crown, Company, Governor-General, and Provinces.</p>
        <p>And <b>Power</b> itself is not one thing — it is economic, political, military, social, intellectual, and spiritual capital, and a change in one usually drags the others with it. A weakening emperor doesn't just lose armies; he loses the awe that made Zamindars pay up without being asked twice. That coupling — one kind of power leaking into another — is the single idea that explains most of Chapters 1 and 2.</p>

        <p>Companies exist to profit their shareholders — the EIC was no exception at first. But what it eventually became in India went far beyond a trading enterprise: a genuine <span class="term">Company State</span> that, by 1857, controlled 63% of India's territory and 78% of its population. This chapter is about how that empire-building actually began. Recall from Chapter 8 that the 1661 Charter had already given the EIC the right to build forts, command troops, make war and peace, and exercise civil/criminal jurisdiction — the legal toolkit was in place well before it was ever fully used.</p>

CHAPTER_CONTENT[18] = {
  summary: "Three pillars — judiciary, civil services, police — all following the same pattern: structural improvement followed political convenience, not principle. Every major reform was triggered by a crisis or wrested by nationalist pressure. What the British left behind, however inadvertently, is the skeleton independent India still runs on.",

        <p>The <span class="term">Police Act, 1861</span> replaced this with the Irish Constabulary model — road-tested in Sindh (1843, Napier), Punjab (1849), Bombay (1853), and Madras (1859) before Canning's 1860 Police Commission (M.H. Court, <i>not</i> Napier — a common trap) formalised it nationally: Inspector General (province) → Superintendent of Police (district) → Sub-Inspector (thana). This built the org chart, not yet a service — senior posts went to nominated military/European men until Curzon's 1902–03 Frazer Commission created the unified <span class="term">Indian Police (IP)</span> cadre (Indians capped just below British entry level). Entry opened to Indians in 1920; only 20% of SPs were Indian by 1931. The IP became the IPS in 1948, with statutory backing via the All India Services Act, 1951.</p>

        <div class="section-prose">

        <div class="section-prose">
        <p>Every land revenue system from Chapter 16 squeezed the peasant in its own way: the Farming System's revenue farmers extracted without limit; the Permanent Settlement gave the Zamindar full legal power and left the ryot with no occupancy rights at all; Ryotwari and Mahalwari's direct high demands drove ryots into moneylenders' hands, and default meant losing the land outright — cultivator to labourer in one generation.</p>
        <p><span class="term">Indigo cultivation</span> (Bengal until 1860, Bihar until 1918) was a separate horror — a debt trap by design: European planters forced ryots to grow indigo on part of their land via an upfront loan, then bought the crop back below market rate, keeping the ryot perpetually indebted while indigo itself exhausted soil needed for food crops. Refusal brought the planter's agents, local officials, and courts down together — structurally identical to modern bonded labour.</p>
        <p>Religion played a double role: as <b>grievance</b> (missionary conversion, ended revenue-free religious land grants, and reform laws like Sati Abolition/Lex Loci/Widow Remarriage seen as religious interference) and as <b>organiser</b> — in a world with no parties, mass newspapers, or formal organisations, a religious sect already had a leader, philosophy, and habit of collective action, doing the work modern political parties do today.</p>

        <div class="section-prose">
        <p>The theory claims Hume founded the INC as deliberate British strategy — a platform to vent educated Indian grievance and prevent a violent mass uprising. Its origin: William Wedderburn's 1913 biography of Hume, claiming that in 1878 Hume discovered seven volumes of secret reports describing a lower-class conspiracy to overthrow British rule, alarming him into approaching Viceroy Dufferin to jointly engineer the INC as a pressure valve. R.P. Dutt later endorsed this reading too.</p>

  summary: "\"A despotism controlled from home\" — Secretary of State Charles Wood's own description of what British India actually was, and it stayed true right until 1947. This chapter gives you the exact mechanics of that despotism: how one council wore two hats, and why the numbers were always rigged before a single vote was cast.",

        <p>In 1862, the first three Indians nominated — the Raja of Banaras, the Maharaja of Patiala, and Dinkar Rao of Gwalior — were all elite, several from Princely States that had stayed loyal in 1857: reward loyalty, practice divide and rule. Until 1892, only 45 Indians total were ever nominated — mostly Zamindars, moneylenders, and British businessmen.</p>

CHAPTER_CONTENT[26] = {
  summary: "Twenty years of petitions, and not a single major demand met. Understanding exactly why the Moderates failed — narrow demographic base, genuine distrust of the masses, and a class position that put them on the wrong side of labour reform — is the necessary setup for understanding why the Extremists broke away from them in Chapter 29.",

        <p>The core bargain: the Muslim League gave up its right to vote in general/unreserved seats; in exchange, the INC formally accepted the principle of Separate Electorates and a fixed Muslim seat quota. The British later hard-wired this exact compromise into the GoI Act 1919 as fully "watertight" electoral rolls (Chapter 34) — the institutional hardening of communal division that the Pact had, with the best of intentions, set in motion.</p>

  summary: "Twenty-two years that were never meant to happen — a young barrister took a short commercial case and stayed to fight, and forge, everything he would later bring home. Every method in the Indian freedom struggle's Gandhian toolkit was tested here first: Champaran, Kheda, and Dandi are South Africa's experiments, replayed at scale.",

CHAPTER_CONTENT[42] = {
  summary: "Viceroy Linlithgow said it plainly: the GoI Act 1935 was \"the best way to maintain control over India.\" And yet this same 321-section Act — designed for control — handed independent India the Federal/Concurrent/Provincial list structure, the Federal Court, and the Instrument of Instructions almost wholesale. Four confirmed Prelims hits and a genuine Mains classic make this the constitutional hinge of the entire course.",

    {
      title: "1 · Why the Act Was Passed",
      html: `
        <div class="section-prose">
        <p>Not from any genuine desire to grant self-government — Linlithgow (Viceroy 1936-43, who actually implemented the Act from 1937) was blunt about the real purpose. Two kinds of pressure forced Britain's hand: from below (revolutionary activity via the HRA/HSRA/Chittagong, the anti-Simon agitations, the Civil Disobedience Movement, and mass Depression-era economic suffering) and from above (the accumulated legal groundwork of the Simon Commission and three Round Table Conferences).</p>

        <div class="section-prose">
        <p>The all-British <span class="term">Simon Commission (report, June 1930)</span> recommended: Provincial Autonomy (abolish Dyarchy, full responsible provincial government, with Governor emergency powers retained); no change at the Centre; expanded but still limited franchise; continued separate electorates; NWFP's province status reaffirmed; Sindh's separation contingent on a Finance Boundary Commission; and Burma's separation from India (delivered 1937).</p>
        <p>The three RTCs added little of substance: the 1st (1930) saw only Princely States and non-INC parties attend, with the Princes themselves pushing for federation; the 2nd (1931) had INC present but saw its demands for federal responsible government and Purna Swaraj both rejected; the 3rd (1932) ran without INC at all, attendance so thin it was barely relevant. The Act, in short, emerged from a process the INC had no real part in shaping — no Indian on Simon, boycotted 1st/3rd RTCs, a failed 2nd RTC, and the Nehru Report's own vision left permanently unfulfilled.</p>
        </div>
      `

      title: "3 · Territorial Changes",
      html: `
        <div class="section-prose">
        <p>Orissa and Bihar became full separate provinces (1936, splitting the combined 1912 "Bihar & Orissa"); Sindh separated from Bombay (1936); NWFP's 1932 province status was reaffirmed, gaining genuine responsible government only with 1937 implementation; Burma was separated in 1937.</p>
        </div>
      `
    },
    {
      title: "4 · The Centre — the Part That Never Happened",
      html: `
        <div class="section-prose">
        <p>Every central-federal provision stayed on paper — the GoI Act 1919 kept governing the Centre in practice throughout. The proposed <span class="term">Federation</span> needed at least 50% of Princes to sign an <span class="term">Instrument of Accession (IoA)</span>, transferring only Defence, Foreign Affairs, and Communications to the Union (structurally identical to how J&K would later sign only an IoA in 1947, the direct root of Article 370). That 50% threshold was never met — Paramountcy stayed intact, so Princes faced two potential bosses rather than one; joining risked being forced to fund the central Defence Budget; smaller states feared low central representation; and every Prince feared the INC could now agitate inside Princely territory too.</p>
        <div class="pyq-alert prelims">
          <span class="pa-tag">Prelims PYQ · 2024</span>
          <p class="pa-q">On the GoI Act 1935: (1) it provided for an All India Federation of British Indian provinces and Princely States (2) Defence and Foreign Affairs were kept under the federal legislature's control.</p>
          <p class="pa-a"><b>(a) 1 only.</b> Defence and Foreign Affairs were Reserved subjects under the Viceroy's own control, not the federal legislature's.</p>
        </div>
        <p>The proposed bicameral centre — Federal Assembly (FA) and Council of States (CoS) — was itself rigged: one-third of the FA (the more powerful house) would be Prince nominees, not elected, deliberately capping any possible INC majority; CoS elections were direct, FA elections indirect (indirect elections favour regional over all-India parties, again limiting INC strength in the stronger house).</p>
        <p>Voting rights expanded but stayed restricted to roughly 10% of the population via income/education criteria — deliberately excluding the INC's own peasant and worker base. Women's franchise remained derived, not independent — tied to a husband's (or, if widowed, his estate's) income/property, though the threshold was set lower than men's, and literacy alone sufficed in many provinces while propertyless men needed a middle-school or matriculation qualification.</p>
        <p>For the first time, subjects were properly divided into <span class="term">Federal, Concurrent, and Provincial lists</span> — the direct ancestor of the Constitution's Seventh Schedule — with provinces gaining genuine constitutional ownership rather than merely delegated administration, marking the real peak of federalism in the British era (a journey that had begun with decentralisation in 1861).</p>
        <div class="pyq-alert prelims">
          <span class="pa-tag">Prelims PYQ · 2018</span>
          <p class="pa-q">Under the Federation the GoI Act 1935 established, who held residuary powers?</p>
          <p class="pa-a"><b>(b) The Governor-General</b> — not the Federal Legislature, Provincial Legislature, or Provincial Governors.</p>
        </div>
        <p>80% of the central Budget stayed non-votable; the Viceroy kept veto, ordinance, restoration-of-cuts, and bill-certification powers. And ironically, the exact Dyarchy model just abolished in the provinces was now proposed at the Centre itself: only four subjects — <b>Defence, External Affairs, Ecclesiastical Affairs, and Tribal Areas</b> — were formally Reserved to the Viceroy; everything else, including Finance and Home, was legally Transferred to a Council of Ministers responsible to the legislature.</p>
        <div class="callout confusion">
          <div class="co-ic">⚠</div>
          <div><b>The Home/Finance trap:</b> Finance and Home were legally Transferred subjects, not Reserved ones. But Section 12's "Special Responsibilities" let the Viceroy override the Finance Minister (to protect federal financial stability) and the Home Minister (to prevent any "grave menace" to peace) — a shadow veto without the formal Reserved label. If a question calls Finance a Reserved subject, it's wrong; if it asks whether the Viceroy could still effectively control it, the answer is yes.</div>
        </div>
        <p>Financial control itself shifted from the Secretary of State in London to the Viceroy in India — Nehru called this "the only major change" in the whole Act. A <span class="term">Federal Court</span> (est. 1937) — the Supreme Court's direct institutional ancestor — and the <span class="term">Reserve Bank of India</span> (RBI Act 1934, operational 1 April 1935, timed to the Act's broader restructuring) rounded out the central architecture.</p>
        </div>
      `

      title: "5 · The Provinces — Where the Act Actually Worked, From 1937",

        <p>Dyarchy ended completely — every provincial subject became Transferred, under a Premier and Council of Ministers genuinely responsible to the Provincial Legislative Assembly, with the Governor now expected to act on their aid and advice. This was, for the first time, real responsible government at the provincial level.</p>
        <p>But the Governor stayed formidable: 40% of the provincial Budget remained non-votable, and he retained discretionary power to summon the PLA, veto bills, issue ordinances, administer tribal areas (the ancestor of the Constitution's Fifth Schedule), protect minority/British-business/civil-servant interests, and — most consequentially — take over the government entirely (the direct institutional root of Article 356).</p>
        <p>Scheduled Castes gained, for the first time, genuinely <i>elected</i> reserved seats via joint electorates (previously only nominated) — women and labour also received dedicated representation, engineered through an "internal carve-out" that fixed each community's total seat quota first, then reserved a portion within it for women, so no community's overall share changed.</p>

        <p>The INC contested the 1937 provincial elections and formed governments — the same logic that had driven Pro-Changers into the councils in 1923: occupy the space rather than let others fill it, and this time genuinely govern, not merely legislate. It won outright majorities in six provinces (Madras, Bombay, UP, CP, Bihar, Orissa) and formed ministries in eight of eleven — coalition governments in Assam and NWFP, where it was the largest party without a majority. Punjab's Unionist Party (Sikandar Hayat Khan) won outright, reducing the Muslim League to just 2 of 175 seats there; Sindh went to the Sind United Party.</p>

  summary: "Workers, capitalists, Dalits, women, and peasants each had their own relationship with the freedom struggle — sometimes allied with it, sometimes fighting it from within, sometimes forced to wait their turn entirely. This closing chapter is where the single, tidy story of 1857-to-1947 finally admits how many different, unresolved stories it was actually made of — several of which the independent Republic inherited unfinished.",

        <p>India's modern industrial worker is a genuinely late arrival — a product of railways, telegraphs, and textile mills from the mid-19th century, decades after Europe's own organised working class had emerged. Early efforts stayed philanthropic rather than political: Sasipada Bannerjee's Working Men's Club (1870); Narayan Lokhande's Bombay Mill Hands Association (1890), growing out of his Deen Bandhu journal.</p>

(function(){

  let progress = {}; // {chapterId: true}
  const hasStorage = typeof window.storage !== 'undefined' && window.storage;

  async function loadProgress(){
    if (hasStorage){
      try{
        const res = await window.storage.get('zafarnama-progress', false);
        if (res && res.value) progress = JSON.parse(res.value);
      }catch(e){ /* key doesn't exist yet — fine */ }
    }
    renderProgressBar();
  }
  async function saveProgress(){
    renderProgressBar();
    if (hasStorage){
      try{ await window.storage.set('zafarnama-progress', JSON.stringify(progress), false); }
      catch(e){ /* non-fatal */ }
    }
  }

    const total = CHAPTERS.length;
    const done = Object.keys(progress).filter(k => progress[k]).length;
    progressFill.style.width = (done/total*100) + '%';
    progressLabel.textContent = done + ' / ' + total + ' chapters studied';
    document.querySelectorAll('.chapter-item').forEach(el=>{
      const id = el.getAttribute('data-chid');
      el.classList.toggle('done', !!progress[id]);

  }

          <span class="ch-title">${c.title}</span>
          <span class="ch-badges">${badges.join('')}</span>
          ${c.status==='soon' ? '<svg class="lock-ic" width="12" height="12" viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M8 11V7a4 4 0 018 0v4" fill="none" stroke="currentColor" stroke-width="2"/></svg>' : ''}
        `;
        item.addEventListener('click', ()=>{ location.hash = '#/chapter/' + c.id; });
        list.appendChild(item);
      });
      block.appendChild(head);
      block.appendChild(list);
      sidebarScroll.appendChild(block);
    });
  }

  function openUnitContaining(chapterId){
    const ch = CHAPTERS.find(c=>c.id===chapterId);
    if (!ch) return;
    document.querySelectorAll('.unit-block').forEach(b=>{
      if (parseInt(b.dataset.unit,10) === ch.unit) b.classList.add('open');
    });
  }

  function setActiveChapter(chapterId){
    document.querySelectorAll('.chapter-item').forEach(el=>{
      el.classList.toggle('active', parseInt(el.dataset.chid,10) === chapterId);
    });
  }

  /* ---------------- rendering: home / roadmap --------------------------- */
  function renderHome(){
    const totalP = CHAPTERS.reduce((s,c)=>s+c.p,0);
    const totalM = CHAPTERS.reduce((s,c)=>s+c.m,0);
    const readyCount = CHAPTERS.filter(c=>c.status==='ready').length;

    let html = `
      <div class="hero">
        <div class="hero-eyebrow">GS Foundation &middot; History (Merged), Ch. 01–47</div>
        <h1>Modern Indian History,<br>built the way UPSC actually asks it.</h1>
        <p>Forty-seven chapters, from Babur's cannon at Panipat to the many voices of 1947 — read once, in one lens for Prelims and another for Mains. Every chapter is cross-checked against seventeen years of Prelims PYQs and thirteen years of Mains PYQs.</p>
        <div class="hero-stats">
          <div class="hero-stat"><b>47</b><span>chapters</span></div>
          <div class="hero-stat"><b>${totalP}</b><span>Prelims PYQs mapped</span></div>
          <div class="hero-stat"><b>${totalM}</b><span>Mains PYQs mapped</span></div>
          <div class="hero-stat"><b>${readyCount}/47</b><span>chapters live</span></div>
        </div>
      </div>
      <div class="unit-grid">
    `;
    UNITS.forEach(u=>{
      const chs = CHAPTERS.filter(c=>c.unit===u.id);
      const ready = chs.filter(c=>c.status==='ready').length;
      html += `
        <div class="unit-card" style="--card-accent:var(--${u.accent})" data-unit="${u.id}">
          <span class="uc-num">Unit ${u.num} &middot; ${u.range}</span>
          <h3>${u.title}</h3>
          <p>${u.desc}</p>
          <div class="uc-meta"><span>${u.years}</span><span>${ready}/${chs.length} ready</span></div>
        </div>
      `;
    });
    html += `</div>`;
    contentEl.innerHTML = html;
    contentEl.querySelectorAll('.unit-card').forEach(card=>{
      card.addEventListener('click', ()=>{
        const uid = parseInt(card.dataset.unit,10);
        const first = CHAPTERS.find(c=>c.unit===uid);
        if (first) location.hash = '#/chapter/' + first.id;
      });
    });
    setActiveChapter(-1);
  }

  /* ---------------- rendering: chapter ---------------------------------- */
  function renderRibbon(ribbon){
    if (!ribbon) return '';
    const total = ribbon.segments.reduce((s,seg)=>s+seg.years,0);
    let segs = ribbon.segments.map(seg=>{
      const grow = Math.max(seg.years, total*0.02);
      return `<div class="ribbon-seg" style="flex-grow:${grow};background:${seg.color}">
        <span>${seg.label}</span>
        <div class="ribbon-tip">${seg.label} &middot; ${seg.sub}</div>
      </div>`;
    }).join('');
    return `
      <div class="ribbon-wrap">
        <div class="ribbon-label">${ribbon.label}</div>
        <div class="ribbon">${segs}</div>
      </div>
    `;
  }

  function renderChapter(chapterId){
    const ch = CHAPTERS.find(c=>c.id===chapterId);
    if (!ch){ renderHome(); return; }
    const unit = UNITS.find(u=>u.id===ch.unit);
    openUnitContaining(chapterId);
    setActiveChapter(chapterId);

    if (ch.status === 'soon'){
      contentEl.innerHTML = `
        <div class="content-inner">
          <div class="crumb"><a data-nav="home">All chapters</a> &rsaquo; Unit ${unit.num}: ${unit.title} &rsaquo; Ch. ${String(ch.id).padStart(2,'0')}</div>
        </div>
        <div class="soon-wrap">
          <div class="soon-ic">🖋️</div>
          <h1>${ch.title}</h1>
          <p>This chapter (${ch.years}) is on the roadmap and hasn't been built out yet — it'll get the same dual-lens Prelims/Mains treatment as Chapter 1, drawn only from the L1–20 and L21–47 Foundation Notes. Tell Claude which chapter to build next.</p>
          <div class="ch-actions" style="justify-content:center;margin-top:22px;">
            <button class="btn primary" data-nav="home">Back to the roadmap</button>
          </div>
        </div>
      `;
      wireCrumbNav();
      return;
    }

    const data = CHAPTER_CONTENT[chapterId];
    const idx = CHAPTERS.filter(c=>c.status==='ready').findIndex(c=>c.id===chapterId);
    // prev/next among ALL chapters (not just ready), for a coherent course order
    const allIdx = CHAPTERS.findIndex(c=>c.id===chapterId);
    const prevCh = CHAPTERS[allIdx-1];
    const nextCh = CHAPTERS[allIdx+1];

    let sectionsHtml = data.sections.map((s,i)=>`
      <div class="section-block" id="sec-${i}">
        <h2><span class="sec-no">${String(i+1).padStart(2,'0')}</span>${s.title.replace(/^\d+\s*·\s*/,'')}</h2>
        ${s.html}
      </div>
    `).join('');

    let prelimsPyqHtml = (data.prelimsPYQs||[]).map(q=>`
      <div class="mcq-card">
        <div class="mcq-meta"><span class="mcq-year">${q.year}</span><span class="mcq-theme">${q.theme||''}</span></div>
        <div class="mcq-q">${escapeHtml(q.text)}</div>
        <button class="mcq-reveal-btn">Reveal answer</button>
        <div class="mcq-answer"><b>Answer —</b> ${escapeHtml(q.answer)}</div>
      </div>
    `).join('') || `<p style="color:var(--ink-soft);font-size:14px;">No directly-mapped Prelims objective question yet for this specific chapter in the 2009–2025 window — its concepts (Jagir, Zamindar, land revenue vocabulary) resurface constantly from Chapter 16 onward, where the PYQ density is much higher.</p>`;

    let mainsPyqHtml = (data.mainsPYQs||[]).map(q=>`
      <div class="essay-card">
        <div class="essay-meta"><span>MAINS ${q.year}</span><span>${q.marks} MARKS</span></div>
        <div class="essay-q">"${escapeHtml(q.text)}"</div>
        <div class="essay-angle"><b>Approach —</b> ${escapeHtml(q.angle)}</div>
      </div>
    `).join('') || `<p style="color:var(--ink-soft);font-size:14px;">No directly-mapped Mains question yet for this specific chapter.</p>`;

    contentEl.innerHTML = `
      <div class="content-inner">
        <div class="crumb"><a data-nav="home">All chapters</a> &rsaquo; <span>Unit ${unit.num}: ${unit.title}</span></div>
        <div class="ch-header">
          <div class="ch-eyebrow">CHAPTER ${String(ch.id).padStart(2,'0')} &middot; UNIT ${unit.num}</div>
          <h1>${ch.title}</h1>
          <span class="ch-years">${ch.years}</span>
          <p class="ch-summary">${data.summary}</p>
          <div class="ch-actions">
            <button class="btn ${progress[ch.id] ? 'done':''}" id="markDoneBtn">${progress[ch.id] ? '✓ Studied' : 'Mark as studied'}</button>
            <button class="btn" id="jumpPyqBtn">Jump to PYQ practice ↓</button>
          </div>
        </div>

        ${renderRibbon(data.ribbon)}

        ${sectionsHtml}

        <div class="pyq-section" id="pyqSection">
          <h2 class="prelims-only">Prelims Practice — Objective PYQs</h2>
          <h2 class="mains-only">Mains Practice — Descriptive PYQs</h2>
          <div class="pyq-sub prelims-only">Real UPSC Prelims questions (2009–2025) mapped to this chapter's content.</div>
          <div class="pyq-sub mains-only">Real UPSC Mains questions (2013–2025) mapped to this chapter, with an answer-writing angle.</div>
          <div class="prelims-only">${prelimsPyqHtml}</div>
          <div class="mains-only">${mainsPyqHtml}</div>
        </div>

        <div class="ch-nav">
          ${prevCh ? `<button class="ch-nav-btn prev" data-nav-ch="${prevCh.id}"><div class="cnb-label">← Previous</div><div class="cnb-title">Ch.${String(prevCh.id).padStart(2,'0')} — ${prevCh.title}</div></button>` : `<div></div>`}
          ${nextCh ? `<button class="ch-nav-btn next" data-nav-ch="${nextCh.id}"><div class="cnb-label">Next →</div><div class="cnb-title">Ch.${String(nextCh.id).padStart(2,'0')} — ${nextCh.title}</div></button>` : `<div></div>`}
        </div>
      </div>
    `;

    wireCrumbNav();
    document.getElementById('markDoneBtn').addEventListener('click', ()=>{
      progress[ch.id] = !progress[ch.id];
      saveProgress();
      const btn = document.getElementById('markDoneBtn');
      btn.textContent = progress[ch.id] ? '✓ Studied' : 'Mark as studied';
      btn.classList.toggle('done', !!progress[ch.id]);
    });
    document.getElementById('jumpPyqBtn').addEventListener('click', ()=>{
      document.getElementById('pyqSection').scrollIntoView({behavior:'smooth', block:'start'});
    });
    contentEl.querySelectorAll('.ch-nav-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{ location.hash = '#/chapter/' + btn.dataset.navCh; });
    });
    contentEl.querySelectorAll('.mcq-reveal-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const card = btn.closest('.mcq-card');
        card.classList.toggle('revealed');
        btn.textContent = card.classList.contains('revealed') ? 'Hide answer' : 'Reveal answer';
      });
    });
    window.scrollTo({top:0, behavior:'instant' in window ? 'instant' : 'auto'});
  }

  function wireCrumbNav(){
    contentEl.querySelectorAll('[data-nav="home"]').forEach(el=>{
      el.addEventListener('click', ()=>{ location.hash = '#/'; });
    });
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  /* ---------------- router ------------------------------------------------ */
  function route(){
    const hash = location.hash || '#/';
    const m = hash.match(/^#\/chapter\/(\d+)/);
    if (m){ renderChapter(parseInt(m[1],10)); }
    else { renderHome(); }
    if (window.matchMedia('(max-width:760px)').matches){
      body.dataset.sidebar = 'closed';
    }
  }
  window.addEventListener('hashchange', route);

  /* ---------------- mode toggle -------------------------------------------- */
  const modeToggle = document.getElementById('modeToggle');
  modeToggle.addEventListener('click', (e)=>{
    const btn = e.target.closest('.mode-btn');
    if (!btn) return;
    const mode = btn.dataset.mode;
    body.dataset.mode = mode;
    modeToggle.querySelectorAll('.mode-btn').forEach(b=>{
      b.setAttribute('aria-selected', b.dataset.mode===mode ? 'true':'false');
    });
    if (hasStorage){ try{ window.storage.set('zafarnama-mode', mode, false); }catch(e){} }
  });
  async function restoreMode(){
    if (hasStorage){
      try{
        const res = await window.storage.get('zafarnama-mode', false);
        if (res && res.value){
          body.dataset.mode = res.value;
          modeToggle.querySelectorAll('.mode-btn').forEach(b=>{
            b.setAttribute('aria-selected', b.dataset.mode===res.value ? 'true':'false');
          });
        }
      }catch(e){ /* default to prelims */ }
    }
  }

  /* ---------------- sidebar toggle (mobile) --------------------------------- */
  document.getElementById('sidebarToggle').addEventListener('click', ()=>{
    body.dataset.sidebar = body.dataset.sidebar === 'open' ? 'closed' : 'open';
  });
  document.getElementById('sidebarScrim').addEventListener('click', ()=>{
    body.dataset.sidebar = 'closed';
  });
  function checkMobile(){
    const mobile = window.matchMedia('(max-width:760px)').matches;
    body.classList.toggle('is-mobile', mobile);
    if (mobile) body.dataset.sidebar = 'closed';
  }
  window.addEventListener('resize', checkMobile);

  /* ---------------- search ------------------------------------------------ */
  const searchBox = document.getElementById('searchBox');
  const searchResults = document.getElementById('searchResults');

  // Build a full-text search index once at startup: strip HTML from every
  // chapter's sections/PYQs so users can search actual content, not just titles.
  function htmlToText(html){
    const div = document.createElement('div');
    div.innerHTML = html;
    return div.textContent.replace(/\s+/g, ' ').trim();
  }
  const searchIndex = CHAPTERS.map(c=>{
    const content = CHAPTER_CONTENT[c.id];
    let text = c.title;
    if (content){
      if (content.summary) text += ' ' + content.summary;
      (content.sections||[]).forEach(s=>{
        text += ' ' + s.title + ' ' + htmlToText(s.html);
      });
      (content.prelimsPYQs||[]).forEach(q=>{ text += ' ' + q.text + ' ' + q.answer; });
      (content.mainsPYQs||[]).forEach(q=>{ text += ' ' + q.text + ' ' + q.angle; });
    }
    return { id: c.id, title: c.title, unit: c.unit, status: c.status, text, textLower: text.toLowerCase() };
  });

  function buildSnippet(textLower, originalText, q){
    const idx = textLower.indexOf(q);
    if (idx === -1) return '';
    const start = Math.max(0, idx - 35);
    const end = Math.min(originalText.length, idx + q.length + 55);
    let snippet = originalText.slice(start, end);
    if (start > 0) snippet = '…' + snippet;
    if (end < originalText.length) snippet = snippet + '…';
    // highlight the match (case-insensitive) within this snippet only
    const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
    return escapeHtml(snippet).replace(re, '<mark>$1</mark>');
  }

  searchBox.addEventListener('input', ()=>{
    const q = searchBox.value.trim().toLowerCase();
    if (!q){ searchResults.classList.remove('show'); return; }

    // Prefer whole-word matches (so "Eka" finds "Eka Movement", not "Vivekananda").
    // Only fall back to plain substring matching if no whole-word hits exist at all
    // (so partial/typo searches like "Rowlat" or "Cripp" still work).
    const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const wordRe = new RegExp('\\b' + escaped, 'i'); // word-start boundary, not full-word end (so "Rowlat" still prefixes "Rowlatt")
    let useWordBoundary = searchIndex.some(entry => wordRe.test(entry.text));

    const titleHits = [];
    const contentHits = [];
    searchIndex.forEach(entry=>{
      const titleMatches = useWordBoundary ? wordRe.test(entry.title) : entry.title.toLowerCase().includes(q);
      const contentMatches = useWordBoundary ? wordRe.test(entry.text) : entry.textLower.includes(q);
      if (titleMatches){ titleHits.push(entry); }
      else if (contentMatches){ contentHits.push(entry); }
    });
    const hits = titleHits.concat(contentHits).slice(0, 10);

    if (!hits.length){
      searchResults.innerHTML = `<div class="search-empty">No chapters match "${escapeHtml(searchBox.value)}"</div>`;
    } else {
      searchResults.innerHTML = hits.map(entry=>{
        const unit = UNITS.find(u=>u.id===entry.unit);
        const isTitleHit = entry.title.toLowerCase().includes(q);
        const snippet = isTitleHit ? '' : buildSnippet(entry.textLower, entry.text, q);
        return `<div class="search-result-item" data-chid="${entry.id}">
          <div class="sr-row"><span class="sr-title">Ch.${String(entry.id).padStart(2,'0')} — ${entry.title}</span><span class="sr-unit">Unit ${unit.num}</span></div>
          ${snippet ? `<div class="sr-snippet">${snippet}</div>` : ''}
        </div>`;
      }).join('');
    }
    searchResults.classList.add('show');
  });
  searchResults.addEventListener('click', (e)=>{
    const item = e.target.closest('.search-result-item');
    if (!item || !item.dataset.chid) return;
    location.hash = '#/chapter/' + item.dataset.chid;
    searchBox.value = '';
    searchResults.classList.remove('show');
  });
  document.addEventListener('click', (e)=>{
    if (!e.target.closest('.search-wrap')) searchResults.classList.remove('show');
  });

  /* ---------------- init ---------------------------------------------------- */
  buildSidebar();
  checkMobile();
  loadProgress();
  restoreMode();
  route();

})();

</script>
</body>
</html>
